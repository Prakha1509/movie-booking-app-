<!DOCTYPE html>
<html>
<head>
  <title>Movie Booking App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 Movie Booking App</h1>

<label>Select Movie:</label>
<select id="movie">
  <option value="200">Avengers - ₹200</option>
  <option value="150">Batman - ₹150</option>
  <option value="180">Spider-Man - ₹180</option>
</select>

<br><br>

<label>Number of Seats:</label>
<input type="number" id="seats" placeholder="Enter seats">

<br><br>

<button onclick="bookTicket()">Book Now</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
